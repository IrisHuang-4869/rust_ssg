<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">PeanutButter</div>
            <nav class="nav" aria-label="Main">
                <span>Posts</span>
                <span>About</span>
                <span>Random</span>
                <span>Blogroll</span>
            </nav>
        </div>
    </header>

    <main>
        <article>
            <h1>{{ title }}</h1>
            <p class="meta">閱讀時間約 ? 分鐘</p>
            <div class="content">
                {{ content | safe }}
            </div>
        </article>
    </main>

    <footer>Made by PeanutButter</footer>
</body>
</html>
